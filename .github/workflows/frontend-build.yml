name: Frontend Build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'frontend/**'
      - 'backend/internal/web/**'
      - '.github/workflows/frontend-build.yml'
  push:
    branches:
      - 'feat/**'
      - 'fix/**'
      - 'ci/**'
    paths:
      - 'frontend/**'
      - 'backend/internal/web/**'
      - '.github/workflows/frontend-build.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: frontend
        run: pnpm run typecheck

      - name: Critical component tests
        working-directory: frontend
        run: pnpm exec vitest run src/components/account/__tests__/ModelWhitelistSelector.spec.ts src/components/account/__tests__/BulkEditAccountModal.spec.ts

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: backend/internal/web/dist/
          retention-days: 3
