name: Fix token.studybp.com certificate manual

on:
  workflow_dispatch:

jobs:
  fix-cert:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Fix certificate on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          REMOTE_SCRIPT_B64: 
        run: |
          set -euo pipefail
          : "${SSH_HOST:?SSH_HOST is required}"
          : "${SSH_USERNAME:?SSH_USERNAME is required}"
          : "${SSH_PASSWORD:?SSH_PASSWORD is required}"
          SSH_PORT="${SSH_PORT:-22}"
          export SSHPASS="$SSH_PASSWORD"
          printf '%s' "$REMOTE_SCRIPT_B64" | base64 -d > /tmp/fix-token-studybp-cert.sh
          sshpass -e scp -P "$SSH_PORT" -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/tmp/token-gateway-known-hosts /tmp/fix-token-studybp-cert.sh "$SSH_USERNAME@$SSH_HOST:/tmp/fix-token-studybp-cert.sh"
          sshpass -e ssh -p "$SSH_PORT" -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/tmp/token-gateway-known-hosts "$SSH_USERNAME@$SSH_HOST" 'bash /tmp/fix-token-studybp-cert.sh'
