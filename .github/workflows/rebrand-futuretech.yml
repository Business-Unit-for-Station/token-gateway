name: Rebrand token gateway to FutureTech

on:
  workflow_dispatch:

jobs:
  rebrand:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass
      - name: Apply FutureTech branding on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          REMOTE_SCRIPT_B64: 
        run: |
          set -euo pipefail
          SSH_PORT="${SSH_PORT:-22}"
          export SSHPASS="$SSH_PASSWORD"
          printf '%s' "$REMOTE_SCRIPT_B64" | base64 -d > /tmp/rebrand-token-gateway.sh
          sshpass -e scp -P "$SSH_PORT" -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/tmp/token-known-hosts /tmp/rebrand-token-gateway.sh "$SSH_USERNAME@$SSH_HOST:/tmp/rebrand-token-gateway.sh"
          sshpass -e ssh -p "$SSH_PORT" -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/tmp/token-known-hosts "$SSH_USERNAME@$SSH_HOST" 'bash /tmp/rebrand-token-gateway.sh'
