name: Persist token.studybp.com Stripe config

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/persist-token-studybp-stripe.yml'

jobs:
  persist-stripe:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Persist Stripe provider/config via live Admin API
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          PROVIDER_BODY_JSON: ${{ secrets.TOKEN_GATEWAY_STRIPE_PROVIDER_BODY_JSON }}
          PAYMENT_CONFIG_BODY_JSON: ${{ secrets.TOKEN_GATEWAY_PAYMENT_CONFIG_BODY_JSON }}
        run: |
          set -euo pipefail
          : "${SSH_HOST:?SSH_HOST is required}"
          : "${SSH_USERNAME:?SSH_USERNAME is required}"
          : "${SSH_PASSWORD:?SSH_PASSWORD is required}"
          : "${PROVIDER_BODY_JSON:?TOKEN_GATEWAY_STRIPE_PROVIDER_BODY_JSON is required}"
          : "${PAYMENT_CONFIG_BODY_JSON:?TOKEN_GATEWAY_PAYMENT_CONFIG_BODY_JSON is required}"
          SSH_PORT="${SSH_PORT:-22}"
          export SSHPASS="$SSH_PASSWORD"
          printf '%s' '' | base64 -d > /tmp/read-admin-key.sh
          ADMIN_KEY=$(sshpass -e ssh -p "$SSH_PORT" -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/tmp/token-studybp-known-hosts "$SSH_USERNAME@$SSH_HOST" 'bash -s' < /tmp/read-admin-key.sh)
          if [ -z "$ADMIN_KEY" ]; then
            echo "Failed to obtain admin API key" >&2
            exit 1
          fi

          python3 -c 'import os,json; print(json.dumps(json.loads(os.environ["PROVIDER_BODY_JSON"]), ensure_ascii=False, separators=(",",":")))' > /tmp/provider.json
          python3 -c 'import os,json; print(json.dumps(json.loads(os.environ["PAYMENT_CONFIG_BODY_JSON"]), ensure_ascii=False, separators=(",",":")))' > /tmp/payment-config.json

          provider_status=$(curl -sS -o /tmp/provider-response.json -w '%{http_code}' \
            -X POST 'https://token.studybp.com/api/v1/admin/payment/providers' \
            -H 'Content-Type: application/json' \
            -H "x-api-key: $ADMIN_KEY" \
            --data-binary @/tmp/provider.json)
          echo "provider_status=$provider_status"
          if [ "$provider_status" -lt 200 ] || [ "$provider_status" -ge 300 ]; then
            python3 -c 'import json,pathlib; raw=pathlib.Path("/tmp/provider-response.json").read_text(errors="replace")[:1000]; print("provider_error_code=" + str((json.loads(raw) if raw else {}).get("code","unknown")))'
            exit 1
          fi

          config_status=$(curl -sS -o /tmp/config-response.json -w '%{http_code}' \
            -X PUT 'https://token.studybp.com/api/v1/admin/payment/config' \
            -H 'Content-Type: application/json' \
            -H "x-api-key: $ADMIN_KEY" \
            --data-binary @/tmp/payment-config.json)
          echo "config_status=$config_status"
          if [ "$config_status" -lt 200 ] || [ "$config_status" -ge 300 ]; then
            python3 -c 'import json,pathlib; raw=pathlib.Path("/tmp/config-response.json").read_text(errors="replace")[:1000]; print("config_error_code=" + str((json.loads(raw) if raw else {}).get("code","unknown")))'
            exit 1
          fi

          verify_status=$(curl -sS -o /tmp/admin-settings.json -w '%{http_code}' \
            -H "x-api-key: $ADMIN_KEY" \
            'https://token.studybp.com/api/v1/admin/settings')
          echo "admin_settings_status=$verify_status"
          python3 -c 'import json,pathlib; obj=json.loads(pathlib.Path("/tmp/admin-settings.json").read_text(errors="replace") or "{}"); data=obj.get("data", obj) if isinstance(obj,dict) else {}; pc=data.get("payment_config", data.get("payment", {})) if isinstance(data,dict) else {}; print("verify_json=true"); print("payment_enabled=" + str(pc.get("enabled"))); print("enabled_payment_types=" + ",".join(map(str, pc.get("enabled_payment_types") or []))); print("stripe_publishable_key_present=" + str(bool(pc.get("stripe_publishable_key"))))'
