name: Persist token.studybp.com Stripe config

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/persist-token-studybp-stripe.yml'

jobs:
  persist-stripe:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Persist Stripe provider/config via live Admin API
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          PROVIDER_BODY_JSON: ${{ secrets.TOKEN_GATEWAY_STRIPE_PROVIDER_BODY_JSON }}
          PAYMENT_CONFIG_BODY_JSON: ${{ secrets.TOKEN_GATEWAY_PAYMENT_CONFIG_BODY_JSON }}
        run: |
          set -euo pipefail
          : "${SSH_HOST:?SSH_HOST is required}"
          : "${SSH_USERNAME:?SSH_USERNAME is required}"
          : "${SSH_PASSWORD:?SSH_PASSWORD is required}"
          : "${PROVIDER_BODY_JSON:?TOKEN_GATEWAY_STRIPE_PROVIDER_BODY_JSON is required}"
          : "${PAYMENT_CONFIG_BODY_JSON:?TOKEN_GATEWAY_PAYMENT_CONFIG_BODY_JSON is required}"
          SSH_PORT="${SSH_PORT:-22}"
          export SSHPASS="$SSH_PASSWORD"

          cat > /tmp/read-admin-key.sh <<'REMOTE'
          set -euo pipefail
          cd /opt/token-gateway/deploy
          set -a
          . ./.env
          set +a
          DB_CONTAINER="sub2api-postgres"
          if ! docker ps --format '{{.Names}}' | grep -qx "$DB_CONTAINER"; then
            DB_CONTAINER=$(docker ps --format '{{.Names}}' | grep -E 'postgres' | head -1 || true)
          fi
          if [ -z "$DB_CONTAINER" ]; then
            echo "postgres container not found" >&2
            exit 1
          fi
          PGUSER="${POSTGRES_USER:-sub2api}"
          PGDB="${POSTGRES_DB:-sub2api}"
          ADMIN_KEY=$(docker exec -e PGPASSWORD="$POSTGRES_PASSWORD" "$DB_CONTAINER" psql -U "$PGUSER" -d "$PGDB" -tA -c "SELECT value FROM settings WHERE key='admin_api_key' LIMIT 1;" | tr -d '\r\n')
          if [ -z "$ADMIN_KEY" ]; then
            ADMIN_KEY="admin-$(openssl rand -hex 32)"
            docker exec -e PGPASSWORD="$POSTGRES_PASSWORD" "$DB_CONTAINER" psql -U "$PGUSER" -d "$PGDB" -v ON_ERROR_STOP=1 -q -c "INSERT INTO settings (key, value, updated_at) VALUES ('admin_api_key', '$ADMIN_KEY', NOW()) ON CONFLICT (key) DO UPDATE SET value = EXCLUDED.value, updated_at = NOW();" >/dev/null
          fi
          printf '%s' "$ADMIN_KEY"
          REMOTE

          ADMIN_KEY=$(sshpass -e ssh -p "$SSH_PORT" -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/tmp/token-studybp-known-hosts "$SSH_USERNAME@$SSH_HOST" 'bash -s' < /tmp/read-admin-key.sh)
          if [ -z "$ADMIN_KEY" ]; then
            echo "Failed to obtain admin API key" >&2
            exit 1
          fi

          python3 - <<'PY' > /tmp/provider.json
          import os, json
          obj=json.loads(os.environ['PROVIDER_BODY_JSON'])
          print(json.dumps(obj, ensure_ascii=False, separators=(',',':')))
          PY
          python3 - <<'PY' > /tmp/payment-config.json
          import os, json
          obj=json.loads(os.environ['PAYMENT_CONFIG_BODY_JSON'])
          print(json.dumps(obj, ensure_ascii=False, separators=(',',':')))
          PY

          provider_status=$(curl -sS -o /tmp/provider-response.json -w '%{http_code}' \
            -X POST 'https://token.studybp.com/api/v1/admin/payment/providers' \
            -H 'Content-Type: application/json' \
            -H "x-api-key: $ADMIN_KEY" \
            --data-binary @/tmp/provider.json)
          echo "provider_status=$provider_status"
          if [ "$provider_status" -lt 200 ] || [ "$provider_status" -ge 300 ]; then
            python3 - <<'PY'
            import json, pathlib
            raw=pathlib.Path('/tmp/provider-response.json').read_text(errors='replace')[:1000]
            try:
                obj=json.loads(raw)
                print('provider_error_code=' + str(obj.get('code') or obj.get('error') or obj.get('message') or 'unknown'))
            except Exception:
                print('provider_error_unparseable')
            PY
            exit 1
          fi

          config_status=$(curl -sS -o /tmp/config-response.json -w '%{http_code}' \
            -X PUT 'https://token.studybp.com/api/v1/admin/payment/config' \
            -H 'Content-Type: application/json' \
            -H "x-api-key: $ADMIN_KEY" \
            --data-binary @/tmp/payment-config.json)
          echo "config_status=$config_status"
          if [ "$config_status" -lt 200 ] || [ "$config_status" -ge 300 ]; then
            python3 - <<'PY'
            import json, pathlib
            raw=pathlib.Path('/tmp/config-response.json').read_text(errors='replace')[:1000]
            try:
                obj=json.loads(raw)
                print('config_error_code=' + str(obj.get('code') or obj.get('error') or obj.get('message') or 'unknown'))
            except Exception:
                print('config_error_unparseable')
            PY
            exit 1
          fi

          verify_status=$(curl -sS -o /tmp/payment-public-config.json -w '%{http_code}' \
            'https://token.studybp.com/api/v1/payment/config')
          echo "public_payment_config_status=$verify_status"
          python3 - <<'PY'
          import json, pathlib
          raw=pathlib.Path('/tmp/payment-public-config.json').read_text(errors='replace')
          try:
              obj=json.loads(raw)
          except Exception:
              print('verify_json=false')
              raise SystemExit(0)
          data=obj.get('data', obj) if isinstance(obj, dict) else {}
          print('verify_json=true')
          print('payment_enabled=' + str(data.get('enabled')))
          print('enabled_payment_types=' + ','.join(map(str, data.get('enabled_payment_types') or [])))
          print('stripe_publishable_key_present=' + str(bool(data.get('stripe_publishable_key'))))
          PY
