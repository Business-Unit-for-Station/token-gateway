name: Enable token.studybp.com email registration

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/enable-token-studybp-email-registration.yml'

jobs:
  enable-email-registration:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Enable regular email registration
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          : "${SSH_HOST:?SSH_HOST is required}"
          : "${SSH_USERNAME:?SSH_USERNAME is required}"
          : "${SSH_PASSWORD:?SSH_PASSWORD is required}"
          SSH_PORT="${SSH_PORT:-22}"
          export SSHPASS="$SSH_PASSWORD"

          cat > /tmp/enable-email-registration.sh <<'REMOTE'
          set -euo pipefail
          cd /opt/token-gateway/deploy
          set -a
          . ./.env
          set +a

          DB_CONTAINER="sub2api-postgres"
          if ! docker ps --format '{{.Names}}' | grep -qx "$DB_CONTAINER"; then
            DB_CONTAINER=$(docker ps --format '{{.Names}}' | grep -E 'postgres' | head -1 || true)
          fi
          if [ -z "$DB_CONTAINER" ]; then
            echo "postgres container not found" >&2
            exit 1
          fi

          PGUSER="${POSTGRES_USER:-sub2api}"
          PGDB="${POSTGRES_DB:-sub2api}"
          cat > /tmp/enable-email-registration.sql <<'SQL'
          INSERT INTO settings (key, value, updated_at)
          VALUES
            ('registration_enabled', 'true', NOW()),
            ('invitation_code_enabled', 'false', NOW())
          ON CONFLICT (key) DO UPDATE
          SET value = EXCLUDED.value,
              updated_at = NOW();

          SELECT key, value
          FROM settings
          WHERE key IN ('registration_enabled', 'invitation_code_enabled')
          ORDER BY key;
          SQL

          docker exec -i -e PGPASSWORD="$POSTGRES_PASSWORD" "$DB_CONTAINER" \
            psql -U "$PGUSER" -d "$PGDB" -v ON_ERROR_STOP=1 -f - < /tmp/enable-email-registration.sql

          docker compose -f docker-compose.local.yml restart
          REMOTE

          sed -i 's/^          //' /tmp/enable-email-registration.sh
          sshpass -e ssh -p "$SSH_PORT" \
            -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile=/tmp/token-studybp-known-hosts \
            "$SSH_USERNAME@$SSH_HOST" 'bash -s' < /tmp/enable-email-registration.sh

      - name: Verify public registration settings
        run: |
          set -euo pipefail
          for i in $(seq 1 12); do
            status=$(curl -sS -o /tmp/public-settings.json -w '%{http_code}' 'https://token.studybp.com/api/v1/settings/public')
            echo "public_settings_status=$status"
            if [ "$status" -ge 200 ] && [ "$status" -lt 300 ]; then
              if python3 - <<'PY'
          import json
          from pathlib import Path

          obj = json.loads(Path('/tmp/public-settings.json').read_text())
          data = obj.get('data', obj) if isinstance(obj, dict) else {}
          registration = data.get('registration_enabled')
          invitation = data.get('invitation_code_enabled')
          print(f'registration_enabled={registration}')
          print(f'invitation_code_enabled={invitation}')
          if registration is not True:
              raise SystemExit(1)
          if invitation is not False:
              raise SystemExit(1)
          PY
              then
                exit 0
              fi
            fi
            sleep 5
          done
          echo 'registration settings did not become visible in time' >&2
          exit 1
