name: Deploy token-gateway

on:
  workflow_dispatch:

jobs:
  build-image:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image metadata
        id: meta
        run: |
          set -euo pipefail
          echo "image_tag=token-gateway:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_file=token-gateway-${GITHUB_SHA}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Build Docker image on runner
        run: |
          set -euo pipefail
          docker build \
            --build-arg COMMIT="${GITHUB_SHA}" \
            -t "token-gateway:${GITHUB_SHA}" \
            -f Dockerfile \
            .

      - name: Save Docker image artifact
        run: |
          set -euo pipefail
          docker save "token-gateway:${GITHUB_SHA}" | gzip > "token-gateway-${GITHUB_SHA}.tar.gz"

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: token-gateway-image-${{ github.sha }}
          path: token-gateway-${{ github.sha }}.tar.gz
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: token-gateway-image-${{ github.sha }}

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Write remote deploy script
        run: |
          set -euo pipefail
          cat > /tmp/deploy-token-gateway.sh <<'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail

          APP_DIR="/opt/token-gateway"
          REPO_URL="https://github.com/Business-Unit-for-Station/token-gateway.git"
          DOMAIN="token.studybp.com"
          CONF="/etc/nginx/conf.d/${DOMAIN}.conf"
          IMAGE_TAG="${IMAGE_TAG:?IMAGE_TAG is required}"
          IMAGE_FILE="${IMAGE_FILE:?IMAGE_FILE is required}"

          echo "== Ensure base tools =="
          if command -v dnf >/dev/null 2>&1; then
            dnf install -y git curl openssl gzip >/dev/null
          elif command -v yum >/dev/null 2>&1; then
            yum install -y git curl openssl gzip >/dev/null
          elif command -v apt-get >/dev/null 2>&1; then
            apt-get update >/dev/null
            apt-get install -y git curl openssl gzip >/dev/null
          fi

          if ! command -v docker >/dev/null 2>&1; then
            echo "Docker is not installed on server" >&2
            exit 1
          fi

          echo "== Checkout repository for deploy files =="
          mkdir -p "$(dirname "$APP_DIR")"
          if [ -d "$APP_DIR/.git" ]; then
            git -C "$APP_DIR" fetch origin main
            git -C "$APP_DIR" reset --hard origin/main
          else
            rm -rf "$APP_DIR"
            git clone --depth 1 "$REPO_URL" "$APP_DIR"
          fi

          cd "$APP_DIR/deploy"

          echo "== Prepare .env =="
          if [ ! -f .env ]; then
            POSTGRES_PASSWORD="$(openssl rand -base64 36 | tr -d '\n')"
            REDIS_PASSWORD="$(openssl rand -base64 36 | tr -d '\n')"
            ADMIN_PASSWORD="$(openssl rand -base64 24 | tr -d '\n')"
            JWT_SECRET="$(openssl rand -hex 64)"
            TOTP_KEY="$(openssl rand -hex 32)"
            cat > .env <<EOF
          BIND_HOST=127.0.0.1
          SERVER_PORT=8080
          POSTGRES_USER=sub2api
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=sub2api
          REDIS_PASSWORD=${REDIS_PASSWORD}
          ADMIN_EMAIL=admin@studybp.com
          ADMIN_PASSWORD=${ADMIN_PASSWORD}
          JWT_SECRET=${JWT_SECRET}
          TOTP_ENCRYPTION_KEY=${TOTP_KEY}
          SERVER_MODE=release
          RUN_MODE=standard
          EOF
            chmod 600 .env
            echo "Created /opt/token-gateway/deploy/.env with generated credentials. Values are not printed."
          else
            grep -q '^BIND_HOST=' .env && sed -i 's/^BIND_HOST=.*/BIND_HOST=127.0.0.1/' .env || echo 'BIND_HOST=127.0.0.1' >> .env
            grep -q '^SERVER_PORT=' .env && sed -i 's/^SERVER_PORT=.*/SERVER_PORT=8080/' .env || echo 'SERVER_PORT=8080' >> .env
            chmod 600 .env
            echo "Reusing existing .env; ensured BIND_HOST=127.0.0.1 and SERVER_PORT=8080."
          fi

          echo "== Load image built by GitHub Actions =="
          gzip -dc "/tmp/${IMAGE_FILE}" | docker load
          cat > docker-compose.ci-image.yml <<EOF
          services:
            sub2api:
              image: ${IMAGE_TAG}
          EOF

          echo "== Start token-gateway stack =="
          if docker compose version >/dev/null 2>&1; then
            docker compose -f docker-compose.yml -f docker-compose.ci-image.yml --env-file .env up -d --force-recreate sub2api
          else
            docker-compose -f docker-compose.yml -f docker-compose.ci-image.yml --env-file .env up -d --force-recreate sub2api
          fi

          echo "== Containers =="
          docker ps -a --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}' | sed -n '1,80p'

          echo "== Ensure Nginx upstream =="
          if [ -f "$CONF" ]; then
            cp "$CONF" "${CONF}.bak.deploy.$(date +%Y%m%d%H%M%S)"
          fi
          cat > "$CONF" <<'EOF'
          server {
              listen 80;
              server_name token.studybp.com;
              return 301 https://$host$request_uri;
          }

          server {
              listen 443 ssl;
              server_name token.studybp.com;

              ssl_certificate /etc/letsencrypt/live/token.studybp.com/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/token.studybp.com/privkey.pem;
              include /etc/letsencrypt/options-ssl-nginx.conf;
              ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

              client_max_body_size 50m;

              location / {
                  proxy_pass http://127.0.0.1:8080;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
              }
          }
          EOF
          nginx -t
          systemctl reload nginx || nginx -s reload

          echo "== Wait for app readiness =="
          while :; do
            status="$(docker inspect sub2api --format '{{.State.Status}} {{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' 2>/dev/null || true)"
            echo "sub2api ${status}"
            case "$status" in
              *' healthy'*) break ;;
              'exited '*|'dead '*|'removing '*)
                docker logs --tail 200 sub2api || true
                echo "sub2api did not stay running" >&2
                exit 1
                ;;
            esac
            if curl -fsS -I http://127.0.0.1:8080/ >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          echo "== Final probes =="
          curl -fsS -I http://127.0.0.1:8080/ | sed -n '1,12p'
          curl -fsS -I http://127.0.0.1/ -H "Host: ${DOMAIN}" | sed -n '1,12p'
          rm -f "/tmp/${IMAGE_FILE}"
          SCRIPT

      - name: Copy image and deploy script to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          SSH_PORT="${SSH_PORT:-22}"
          IMAGE_FILE="token-gateway-${GITHUB_SHA}.tar.gz"
          export SSHPASS="$SSH_PASSWORD"
          sshpass -e scp -P "$SSH_PORT" -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/tmp/token-known-hosts "$IMAGE_FILE" "$SSH_USERNAME@$SSH_HOST:/tmp/$IMAGE_FILE"
          sshpass -e scp -P "$SSH_PORT" -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/tmp/token-known-hosts /tmp/deploy-token-gateway.sh "$SSH_USERNAME@$SSH_HOST:/tmp/deploy-token-gateway.sh"

      - name: Deploy prebuilt image on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          SSH_PORT="${SSH_PORT:-22}"
          IMAGE_FILE="token-gateway-${GITHUB_SHA}.tar.gz"
          IMAGE_TAG="token-gateway:${GITHUB_SHA}"
          export SSHPASS="$SSH_PASSWORD"
          sshpass -e ssh -p "$SSH_PORT" -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/tmp/token-known-hosts "$SSH_USERNAME@$SSH_HOST" "IMAGE_FILE='$IMAGE_FILE' IMAGE_TAG='$IMAGE_TAG' bash /tmp/deploy-token-gateway.sh"
